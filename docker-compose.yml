version: '3.8'

services:
  kafin-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: kafin-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./config:/app/config:ro
      - ./prompts:/app/prompts:ro
      - ./fixtures:/app/fixtures:ro
    environment:
      - PYTHONPATH=/app
    depends_on:
      - redis
    networks:
      - kafin-net

  redis:
    image: redis:7-alpine
    container_name: kafin-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - kafin-net

  n8n:
    image: n8nio/n8n:latest
    container_name: kafin-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - GENERIC_TIMEZONE=Europe/Berlin
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-changeme}
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - kafin-net

volumes:
  redis-data:
  n8n-data:


networks:
  kafin-net:
    driver: bridge
