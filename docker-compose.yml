version: '3.8'

# Kafin v6.1.6 - Chart Analysis Complete Overhaul
# Aktuelle Features: Immer sichtbare Begründungen, ETF/Index Research, vollständige Audit-Prompts

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kafin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       kafin
      POSTGRES_USER:     kafin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kafin_local_dev}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - kafin-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kafin -d kafin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  kafin-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: kafin-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/app:/app/backend/app
      - ./schemas:/app/schemas:ro
      - ./config:/app/config:ro
      - ./prompts:/app/prompts:ro
      - ./fixtures:/app/fixtures:ro
      - ./logs:/app/logs
    environment:
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - kafin-net

  redis:
    image: redis:7-alpine
    container_name: kafin-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - kafin-net

  n8n:
    image: n8nio/n8n:latest
    container_name: kafin-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - GENERIC_TIMEZONE=Europe/Berlin
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-changeme}
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - kafin-net

  kafin-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kafin-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/next.config.ts:/app/next.config.ts
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - INTERNAL_API_URL=http://kafin-backend:8000  # <-- WICHTIG: Überschreibt lokale Env-Werte für Container-zu-Container Kommunikation
    depends_on:
      - kafin-backend
    networks:
      - kafin-net
    command: npm run dev

volumes:
  redis-data:
  n8n-data:
  postgres-data:


networks:
  kafin-net:
    driver: bridge
